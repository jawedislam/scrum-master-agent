# Scrum Master Agent - Auto Deploy Workflow
# 
# Deploys to the root folder of your hosting

name: Deploy Scrum Master Agent

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🧪 Run tests
        run: npm test

      - name: 📁 Prepare deployment folder
        run: |
          mkdir -p deploy
          cp public/index.html deploy/
          cp api.php deploy/

      - name: 🚀 Deploy via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_HOST }}
          username: ${{ secrets.FTP_USER }}
          password: ${{ secrets.FTP_PASS }}
          local-dir: ./deploy/
          server-dir: /
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**

      - name: ✅ Deployment complete
        run: |
          echo "🎉 Deployment successful!"
          echo "Dashboard: https://scrum-master.intra-tech.co/"
